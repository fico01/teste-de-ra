<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon AR Fix</title>
    
    <!-- 1. Importando as bibliotecas como scripts normais (A ordem importa!) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: absolute; top: 10px; left: 10px; z-index: 1000;
        background: rgba(0,0,0,0.7); color: white; padding: 10px;
        font-family: sans-serif; border-radius: 5px;
      }
    </style>
  </head>
  <body>
    
    <div id="ui">Aguardando câmera... (Aponte para a carta)</div>

    <!-- O A-Frame facilita MUITO o rastreio de imagem sem erros de script -->
    <!-- ... resto do seu head ... -->

<a-scene 
  mindar-image="imageTargetSrc: ./pokemons.mind;" 
  color-space="sRGB" 
  renderer="colorManagement: true, physicallyCorrectLights" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">
  
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- ALVO 0: VICTREEBEL -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model 
      src="./glbs/victreebel.glb" 
      position="0 0 0" 
      scale="0.3 0.3 0.3" 
      rotation="75 0 0">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 1: UMBREON -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-gltf-model 
      src="./glbs/umbreon.glb" 
      position="0 0 0" 
      scale="0.1 0.1 0.1">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 2: SUICUNE -->
  <a-entity mindar-image-target="targetIndex: 2">
    <a-gltf-model 
      src="./glbs/suicune.glb" 
      position="0 -0.5 0"
      angle="0 0 0" 
      scale="0.1 0.1 0.1">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 3: ENTEI -->
  <a-entity mindar-image-target="targetIndex: 3">
    <a-gltf-model 
      src="./glbs/entei.glb" 
      position="0 0 0" 
      scale="0.05 0.05 0.05">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 4: ZAPDOS -->
  <a-entity mindar-image-target="targetIndex: 4">
    <a-gltf-model 
      src="./glbs/zapdos.glb" 
      position="0 0 0" 
      scale="0.5 0.5 0.5" 
      rotation="0 0 0">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 5: PIKACHU -->
  <a-entity mindar-image-target="targetIndex: 5">
    <a-gltf-model 
      src="./glbs/pikachu.glb" 
      position="0 0 0" 
      scale="0.1 0.1 0.1">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 6: REGIROCK -->
  <a-entity mindar-image-target="targetIndex: 6">
    <a-gltf-model 
      src="./glbs/regirock.glb" 
      position="0  0 0"
      angle="0 0 0" 
      scale="0.005 0.005 0.005">
    </a-gltf-model>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 7">
    <a-gltf-model 
      src="./glbs/infernape.glb" 
      position="0 0 0" 
      scale="0.5 0.5 0.5">
    </a-gltf-model>
  </a-entity>

   <!-- ALVO 0: GROUDON -->
  <a-entity mindar-image-target="targetIndex: 8">
    <a-gltf-model 
      src="./glbs/tepig.glb" 
      position="0 0 0" 
      scale="5 5 5" 
      rotation="0 0 0">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 1: KYOGRE (ou outro) -->
  <a-entity mindar-image-target="targetIndex: 9">
    <a-gltf-model 
      src="./glbs/mimikyu.glb" 
      position="0 0 0" 
      scale="0.005 0.005 0.005">
    </a-gltf-model>
  </a-entity>

  <!-- ALVO 2: RAYQUAZA -->
  <a-entity mindar-image-target="targetIndex: 10">
    <a-gltf-model 
      src="./glbs/yveltal.glb" 
      position="0 -0.5 0"
      angle="0 0 0" 
      scale="3 3 3">
    </a-gltf-model>
  </a-entity>

   <a-entity mindar-image-target="targetIndex: 11">
    <a-gltf-model 
      src="./glbs/groundon.glb" 
      position="0 0 0" 
      scale="0.5 0.5 0.5">
    </a-gltf-model>
  </a-entity>

</a-scene>

    <script>
      // Apenas para atualizar o texto na tela quando o AR carregar
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", (event) => {
           document.querySelector("#ui").innerText = "AR Pronto! Aponte para a carta.";
        });
      });
    </script>
  </body>
</html>
